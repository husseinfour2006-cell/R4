name: Web to APK Pro
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Project and Install Capacitor
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || echo "<html><body>No index.html found</body></html>" > www/index.html
          cp *.js www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "MyR4App" "com.hussein.r4" --web-dir www
          npx cap add android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Android Project
        run: |
          npx cap copy
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: R4-App-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
